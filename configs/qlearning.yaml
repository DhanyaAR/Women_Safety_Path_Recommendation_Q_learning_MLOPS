# Q-Learning Hyperparameters
# Women's Safety Route Recommendation — REL-MLOPS-PROJECT

algorithm: Q-Learning
justification: "State space (7x7 grid x 2 time modes = 98 states) is small and discrete, making tabular Q-learning fast and interpretable."

hyperparameters:
  alpha: 0.1          # learning rate
  gamma: 0.9          # discount factor
  epsilon: 1.0        # initial exploration rate
  epsilon_decay: 0.995
  epsilon_min: 0.05

training:
  episodes: 1000
  max_steps_per_episode: 200
  policy_mid_checkpoint: 500

environment:
  grid_size: 7
  time_modes: ["day", "night"]
  goal_reward: 50
  boundary_penalty: -20
  loop_penalty: -10
  time_step_penalty: -5
  risk_multiplier: 5
name: Train and Test

on:
  push:
    branches: [main]

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create output folders
        run: mkdir -p experiments/logs experiments/policies experiments/plots

      - name: Run unit and integration tests
        run: python -m pytest tests/ -v

      - name: Run training
        run: python train.py